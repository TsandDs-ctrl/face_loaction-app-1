<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Standort wird gesendet</title>
</head>
<body>

<script>
window.onload = function() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {

                fetch('/save_location', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    })
                });

            },
            (err) => {
                alert("Fehler beim Standort: " + err.message);
            }
        );
    } else {
        alert("Geolocation nicht unterstützt");
    }
};
</script>

<h2>Standort wird gesendet...</h2>

</body>
</html>
